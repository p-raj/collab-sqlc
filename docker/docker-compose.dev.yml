# Development overrides — hot-reload, debug mode, source mounts
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    environment:
      - APP_DEBUG=true
      - AUTH_SECRET_KEY=dev-secret-not-for-production
      - ENCRYPTION_KEY=dev-encryption-key-not-for-production
      - APP_CORS_ORIGINS=["http://localhost:${FRONTEND_DEV_PORT:-5173}","http://localhost:${FRONTEND_PORT:-3000}"]
    volumes:
      - ../backend/src:/app/src
    command: ["uv", "run", "uvicorn", "src.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "${BACKEND_PORT:-8000}", "--reload"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
      args:
        FRONTEND_DEV_PORT: ${FRONTEND_DEV_PORT:-5173}
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:${FRONTEND_DEV_PORT:-5173}"
    volumes:
      - ../frontend/src:/app/src
    command: ["npm", "run", "dev", "--", "--host", "--port", "${FRONTEND_DEV_PORT:-5173}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FRONTEND_DEV_PORT:-5173}"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}
