services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - ../.env
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/collabsql
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${BACKEND_PORT:-8000}/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT:-8000}
    env_file:
      - ../.env
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/collabsql
      - REDIS_URL=redis://redis:6379/0
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-10}
    command:
      - uv
      - run
      - taskiq
      - worker
      - src.jobs.broker:broker
      - src.history.tasks
      - --ack-type
      - when_executed
      - --max-async-tasks
      - ${WORKER_CONCURRENCY:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_CONTAINER_PORT: ${FRONTEND_CONTAINER_PORT:-80}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_EYLO_ORG_ID: ${VITE_EYLO_ORG_ID:-}
        VITE_EYLO_AGENT_ID: ${VITE_EYLO_AGENT_ID:-}
        VITE_SERVER_HTTP_PROTOCOL: ${VITE_SERVER_HTTP_PROTOCOL:-https}
        VITE_SERVER_WS_PROTOCOL: ${VITE_SERVER_WS_PROTOCOL:-wss}
        VITE_SERVER_BASE_HOST: ${VITE_SERVER_BASE_HOST:-}
        VITE_SERVER_BASE_PORT: ${VITE_SERVER_BASE_PORT:-}
        VITE_SERVER_BASE_URL: ${VITE_SERVER_BASE_URL:-}
        VITE_SERVER_WS_BASE_URL: ${VITE_SERVER_WS_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_CONTAINER_PORT:-80}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FRONTEND_CONTAINER_PORT:-80}"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=collabsql
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  cli:
    build:
      context: ../cli
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/collabsql
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
    volumes:
      - ..:/project
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - cli

volumes:
  pgdata:
  redisdata:
